<!DOCTYPE html>
<html lang="ne">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRERAK CRM - Ultimate Partner Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@400;500;700&family=Tiro+Devanagari+Sanskrit&display=swap" rel="stylesheet">
<style>
/* १. प्रिमियम र ब्रान्डेड थिम */
:root {
  --bg: #0b0b0f;
  --surface: #14141d;
  --surface2: #1c1c27;
  --border: #2a2a38;
  --accent: #f97316; /* Saffron/Orange */
  --prerak-red: #ef4444; /* ब्रान्डको रातो */
  --prerak-green: #22c55e; /* ब्रान्डको हरियो */
  --text: #f8fafc;
  --muted: #94a3b8;
  --radius: 16px;
  --glass: rgba(255, 255, 255, 0.03);
}

/* थिम रङहरू बदल्ने अप्सन */
body.theme-blue { --accent: #3b82f6; --prerak-red: #3b82f6; }
body.theme-green { --accent: #10b981; --prerak-red: #10b981; }

* { margin:0; padding:0; box-sizing:border-box; outline:none; }
body { font-family:'DM Sans', sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; overflow:hidden; }

/* २. अत्याधुनिक एनिमेटेड ब्याकग्राउन्ड */
#welcome-overlay {
  position:fixed; inset:0; z-index:9999; display:flex; align-items:center; justify-content:center;
  background: radial-gradient(circle at top right, #1e0a00, #050505);
}
#welcome-overlay.hide { opacity:0; pointer-events:none; transition: 0.8s ease; }

.om-glyph { 
  font-family:'Tiro Devanagari Sanskrit', serif; font-size: 8rem; 
  background: linear-gradient(to bottom, #ff9933, #e05000);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 30px rgba(255, 153, 51, 0.4));
  animation: pulse 3s infinite ease-in-out;
}
@keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

/* ३. साइडबार र नेभिगेसन */
#sidebar { 
  width:260px; background:var(--surface); border-right:1px solid var(--border); 
  display:flex; flex-direction:column; position:relative; z-index:100;
}
.logo-box { padding:30px 24px; border-bottom:1px solid var(--border); }
.logo-title { font-family:'Syne', sans-serif; font-size:1.6rem; font-weight:800; color:var(--prerak-red); }
.logo-green { color:var(--prerak-green); }

nav { flex:1; padding:20px 12px; }
.nav-link { 
  display:flex; align-items:center; gap:12px; padding:12px 16px; border-radius:12px;
  color:var(--muted); text-decoration:none; margin-bottom:4px; transition:0.3s; cursor:pointer;
}
.nav-link:hover, .nav-link.active { background:var(--surface2); color:white; }
.nav-link.active { background:var(--accent); color:white; box-shadow: 0 4px 15px rgba(249, 115, 22, 0.2); }

/* ४. मुख्य इन्टरफेस */
#main-content { flex:1; overflow-y:auto; display:flex; flex-direction:column; }
.top-nav { 
  padding:20px 30px; display:flex; justify-content:space-between; align-items:center;
  background: rgba(11, 11, 15, 0.8); backdrop-filter: blur(10px); position:sticky; top:0; z-index:50;
}
.page { display:none; padding:30px; animation: slideUp 0.4s ease-out; }
.page.active { display:block; }
@keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

/* ५. कार्ड र तालिका डिजाइन */
.glass-card { 
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); 
  padding:24px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}
table { width:100%; border-collapse:collapse; margin-top:10px; }
th { text-align:left; color:var(--muted); font-size:0.75rem; text-transform:uppercase; padding:12px 15px; border-bottom:1px solid var(--border); }
td { padding:15px; border-bottom:1px solid var(--border); font-size:0.9rem; }
tr:hover { background: var(--glass); }

/* ६. बटनहरू र इनपुटहरू */
.btn { 
  padding:10px 20px; border-radius:10px; border:none; cursor:pointer; 
  font-weight:600; display:inline-flex; align-items:center; gap:8px; transition:0.2s;
}
.btn-primary { background:var(--accent); color:white; }
.btn-wa { background: #25D366; color:white; }
.btn-wa:hover { background: #128C7E; transform: translateY(-2px); }

input, select, textarea {
  width:100%; padding:12px; background:var(--surface2); border:1px solid var(--border);
  color:white; border-radius:10px; margin-top:6px;
}

#toast {
  position:fixed; bottom:30px; right:30px; background:var(--accent); color:white;
  padding:15px 25px; border-radius:12px; box-shadow:0 10px 40px rgba(0,0,0,0.4);
  transform: translateY(100px); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
#toast.show { transform: translateY(0); }
</style>
</head>
<body>

<div id="welcome-overlay">
  <div style="text-align:center;">
    <div class="om-glyph">ॐ</div>
    <h2 style="color:#ffd700; margin-top:20px; letter-spacing:3px;">शिवको कृपा</h2>
    <p style="color:var(--muted); margin-top:10px;">PRERAK CRM - सुस्वागतम् साथी</p>
    <button class="btn btn-primary" onclick="closeWelcome()" style="margin-top:40px; padding:15px 40px; border-radius:30px;">🙏 प्रवेश गर्नुहोस्</button>
  </div>
</div>

<aside id="sidebar">
  <div class="logo-box">
    <div class="logo-title">PRERAK<span class="logo-green"> CRM</span></div>
    <div id="bs-date" style="font-size:0.75rem; color:var(--accent); margin-top:8px; font-weight:bold;">बैशाख २०८३</div>
  </div>
  <nav>
    <div class="nav-link active" onclick="navigate('dashboard', this)">📊 ड्यासबोर्ड</div>
    <div class="nav-link" onclick="navigate('customers', this)">👥 ग्राहक सूची</div>
    <div class="nav-link" onclick="navigate('add', this)">➕ नयाँ ग्राहक</div>
    <div style="margin-top:20px; padding:10px; border-top:1px solid var(--border);">
      <button onclick="cycleTheme()" class="btn" style="width:100%; background:var(--surface2); color:var(--muted);">🎨 थिम बदल्नुहोस्</button>
    </div>
  </nav>
</aside>

<main id="main-content">
  <div class="top-nav">
    <h2 id="page-title">ड्यासबोर्ड</h2>
    <div style="display:flex; align-items:center; gap:15px;">
      <span style="font-size:0.85rem; color:var(--muted);">नमस्ते साथी! 👋</span>
    </div>
  </div>

  <div class="page active" id="page-dashboard">
    <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap:20px;">
      <div class="glass-card">
        <h4 style="color:var(--muted);">कुल ग्राहक</h4>
        <h2 id="count-total" style="font-size:2.5rem; margin-top:10px;">0</h2>
      </div>
      <div class="glass-card">
        <h4 style="color:var(--muted);">आजको सक्रियता</h4>
        <div id="act-feed" style="margin-top:15px; font-size:0.85rem; color:var(--muted);">अझै केही छैन...</div>
      </div>
    </div>
  </div>

  <div class="page" id="page-customers">
    <div class="glass-card">
      <input type="text" id="search-bar" oninput="renderCustomers()" placeholder="नाम वा फोनबाट खोज्नुहोस्..." style="margin-bottom:20px;">
      <div style="overflow-x:auto;">
        <table>
          <thead><tr><th>नाम</th><th>फोन</th><th>ठेगाना</th><th>एक्सन</th></tr></thead>
          <tbody id="cust-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="page" id="page-add">
    <div class="glass-card" style="max-width:600px; margin:auto;">
      <h3 style="margin-bottom:20px;">👤 नयाँ ग्राहकको विवरण</h3>
      <label>पुरा नाम</label><input type="text" id="c-name">
      <label style="display:block; margin-top:15px;">फोन नम्बर</label><input type="tel" id="c-phone">
      <label style="display:block; margin-top:15px;">ठेगाना (हेटौँडा-२, कान्तिराजपथ...)</label><input type="text" id="c-address">
      <button class="btn btn-primary" onclick="addCustomer()" style="width:100%; margin-top:30px; padding:15px;">सेभ गर्नुहोस्</button>
    </div>
  </div>
</main>

<div id="toast"></div>

<script>
// १. डाटा म्यानेजमेन्ट (मेरो साथीको लागि विशेष)
let customers = JSON.parse(localStorage.getItem('prerak_cust') || '[]');
let acts = JSON.parse(localStorage.getItem('prerak_act') || '[]');

function save() {
  localStorage.setItem('prerak_cust', JSON.stringify(customers));
  localStorage.setItem('prerak_act', JSON.stringify(acts));
}

function showToast(m) {
  const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// २. डिजिटल भिजिटिङ कार्ड म्यासेज (Template)
function sendWhatsApp(phone, name) {
  const biz = "*PRERAK Construction & Prefab Homes* 🏗️";
  const adr = "Kantirajpath, Hetauda-2";
  const serv = "UPVC Doors, Aluminium, AAC Blocks, Interior Design, Prefab Homes";
  const web = "https://prerakconstruction.com.np"; // तपाईंको कार्ड लिङ्क

  let msg = `*नमस्ते ${name} सर,* 🙏\n\n`;
  msg += `म *${biz}* बाट बोलिरहेको छु।\n\n`;
  msg += `हजुरले खोज्नुभएको सेवाको बारेमा थप विवरण यहाँ हेर्न सक्नुहुन्छ:\n🔗 ${web}\n\n`;
  msg += `*हाम्रा मुख्य सेवाहरू:*\n✅ ${serv}\n\n`;
  msg += `📍 *ठेगाना:* ${adr}\n📞 *सम्पर्क:* 98XXXXXXXX\n\n`;
  msg += `हामीलाई सम्झनुभएकोमा धेरै धन्यवाद!`;

  window.open(`https://wa.me/977${phone}?text=${encodeURIComponent(msg)}`, '_blank');
}

// ३. फङ्सनहरू
function navigate(page, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('page-title').textContent = el.textContent;
  if(page === 'dashboard') renderDashboard();
  if(page === 'customers') renderCustomers();
}

function renderCustomers() {
  const q = document.getElementById('search-bar').value.toLowerCase();
  const list = customers.filter(c => c.name.toLowerCase().includes(q) || c.phone.includes(q));
  document.getElementById('cust-body').innerHTML = list.map(c => `
    <tr>
      <td><b>${c.name}</b></td>
      <td>${c.phone}</td>
      <td><small>${c.address || '-'}</small></td>
      <td>
        <button class="btn btn-wa btn-sm" onclick="sendWhatsApp('${c.phone}', '${c.name}')">WA</button>
      </td>
    </tr>
  `).join('');
}

function addCustomer() {
  const name = document.getElementById('c-name').value;
  const phone = document.getElementById('c-phone').value;
  if(!name || !phone) return showToast('कृपया नाम र फोन भर्नुहोस्!');
  
  customers.push({ id: Date.now(), name, phone, address: document.getElementById('c-address').value });
  acts.unshift({ text: `नयाँ ग्राहक थपियो: ${name}`, time: new Date().toLocaleTimeString() });
  save(); navigate('customers', document.querySelectorAll('.nav-link')[1]);
  showToast('✅ ग्राहक सुरक्षित भयो!');
}

function renderDashboard() {
  document.getElementById('count-total').textContent = customers.length;
  document.getElementById('act-feed').innerHTML = acts.slice(0, 5).map(a => `<div>• ${a.text} <small>(${a.time})</small></div>`).join('') || 'अझै केही छैन...';
}

// ४. थिम र एनिमेसन
let themeIdx = 0;
const themes = ['', 'theme-blue', 'theme-green'];
function cycleTheme() {
  themeIdx = (themeIdx + 1) % themes.length;
  document.body.className = themes[themeIdx];
  showToast('🎨 थिम अपडेट भयो!');
}

function closeWelcome() { document.getElementById('welcome-overlay').classList.add('hide'); }
(function init() { renderDashboard(); })();
</script>
</body>
</html>
