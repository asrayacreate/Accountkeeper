<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prerak OS | All-in-One Business Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Mukta:wght@300;400;600;700&family=Orbitron:wght@700&display=swap');
        body { font-family: 'Mukta', sans-serif; background: #f3f4f6; }
        .logo-font { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .tab-active { border-bottom: 4px solid #1e3a8a; color: #1e3a8a; font-weight: 800; }
        input, select { transition: all 0.3s ease; }
        input:focus { transform: translateY(-2px); border-color: #1e3a8a !important; }
    </style>
</head>
<body class="pb-24">

    <header class="bg-blue-900 text-white p-4 sticky top-0 z-50 shadow-2xl flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="h-10 w-10 bg-white text-blue-900 rounded-xl flex items-center justify-center shadow-inner">
                <i class="fas fa-hammer text-xl"></i>
            </div>
            <div>
                <h1 class="logo-font text-lg leading-none tracking-tighter">PRERAK OS</h1>
                <p class="text-[9px] uppercase font-bold opacity-70 tracking-widest">Construction & Interior v3.0</p>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="downloadBackup()" class="bg-blue-800 p-2 rounded-lg text-xs border border-blue-700 hover:bg-blue-700 transition">
                <i class="fas fa-save mr-1"></i> BACKUP
            </button>
        </div>
    </header>

    <nav class="bg-white border-b sticky top-[72px] z-40 flex overflow-x-auto shadow-sm">
        <button onclick="switchTab('accounting')" id="btn-accounting" class="flex-1 py-4 text-xs uppercase font-black tracking-tighter tab-active">Accounting</button>
        <button onclick="switchTab('crm')" id="btn-crm" class="flex-1 py-4 text-xs uppercase font-black tracking-tighter">Customers (CRM)</button>
        <button onclick="switchTab('staff')" id="btn-staff" class="flex-1 py-4 text-xs uppercase font-black tracking-tighter">Staff Log</button>
    </nav>

    <main class="max-w-4xl mx-auto p-4 space-y-6">

        <section id="sec-accounting" class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white p-5 rounded-3xl shadow-sm border-l-8 border-blue-900">
                    <p class="text-[10px] font-bold text-gray-400 uppercase">कुल कारोबार</p>
                    <h2 id="totalRev" class="text-2xl font-black text-blue-900 leading-none mt-1">रू ०</h2>
                </div>
                <div class="bg-white p-5 rounded-3xl shadow-sm border-l-8 border-green-600">
                    <p class="text-[10px] font-bold text-gray-400 uppercase">प्रोजेक्ट्स</p>
                    <h2 id="totalProj" class="text-2xl font-black text-green-700 leading-none mt-1">०</h2>
                </div>
            </div>

            <div class="bg-white rounded-3xl p-6 shadow-sm border border-gray-100">
                <h3 class="text-xs font-black text-gray-400 uppercase mb-4 flex items-center gap-2"><i class="fas fa-coins text-blue-900"></i> New Transaction</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <input type="text" id="acc_name" placeholder="ग्राहक / सामानको विवरण" class="p-3 bg-gray-50 border rounded-xl outline-none text-sm font-bold">
                    <input type="number" id="acc_amount" placeholder="रकम (रू)" class="p-3 bg-gray-50 border rounded-xl outline-none text-sm font-black">
                    <select id="acc_type" class="p-3 bg-gray-50 border rounded-xl outline-none text-sm font-bold">
                        <option value="UPVC Fabrication">UPVC Fabrication</option>
                        <option value="Interior Design">Interior Design</option>
                        <option value="AAC Block">AAC Block Supply</option>
                        <option value="Other">अन्य सेवा</option>
                    </select>
                    <button onclick="saveAccounting()" class="bg-blue-900 text-white font-bold py-3 rounded-xl shadow-lg active:scale-95 transition">हिसाब सुरक्षित गर्नुहोस्</button>
                </div>
            </div>
            <div id="acc_list" class="space-y-2"></div>
        </section>

        <section id="sec-crm" class="hidden space-y-4">
            <div class="bg-white rounded-3xl p-6 shadow-sm border border-gray-100">
                <h3 class="text-xs font-black text-gray-400 uppercase mb-4 flex items-center gap-2"><i class="fas fa-user-plus text-blue-900"></i> New CRM Entry</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <input type="text" id="crm_name" placeholder="ग्राहकको नाम" class="p-3 bg-gray-50 border rounded-xl outline-none text-sm font-bold">
                    <input type="number" id="crm_phone" placeholder="मोबाइल नम्बर" class="p-3 bg-gray-50 border rounded-xl outline-none text-sm font-bold">
                    <input type="text" id="crm_addr" placeholder="ठेगाना" class="p-3 bg-gray-50 border rounded-xl outline-none text-sm">
                    <select id="crm_status" class="p-3 bg-gray-50 border rounded-xl outline-none text-sm font-bold text-blue-800">
                        <option value="Inquiry">नयाँ सोधपुछ (Inquiry)</option>
                        <option value="Pending">अर्डर बाँकी (Pending)</option>
                        <option value="Completed">काम सम्पन्न (Completed)</option>
                    </select>
                    <button onclick="saveCRM()" class="md:col-span-2 bg-blue-800 text-white font-bold py-3 rounded-xl shadow-lg active:scale-95 transition">CRM रेकर्ड थप्नुहोस्</button>
                </div>
            </div>
            <div id="crm_list" class="grid grid-cols-1 gap-3"></div>
        </section>

        <section id="sec-staff" class="hidden space-y-4">
            <div class="bg-white rounded-3xl p-6 shadow-sm border border-gray-100 text-center">
                <h3 class="text-xs font-black text-gray-400 uppercase mb-4 tracking-widest">स्टाफ हाजिरी र साइट रिपोर्ट</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3 text-left">
                    <input type="text" id="stf_name" placeholder="स्टाफको नाम" class="p-3 bg-gray-50 border rounded-xl outline-none text-sm font-bold">
                    <input type="text" id="stf_site" placeholder="काम गरेको साइट (उदा: कान्तिराजपथ)" class="p-3 bg-gray-50 border rounded-xl outline-none text-sm font-bold text-blue-700">
                    <textarea id="stf_task" placeholder="आज के काम भयो? (छोटो विवरण)" class="p-3 bg-gray-50 border rounded-xl outline-none text-sm md:col-span-2 h-20"></textarea>
                    <button onclick="saveStaff()" class="md:col-span-2 bg-green-700 text-white font-bold py-3 rounded-xl shadow-lg active:scale-95 transition">साइट लग अपडेट गर्नुहोस्</button>
                </div>
            </div>
            <div id="stf_list" class="space-y-3"></div>
        </section>

    </main>

    <div class="md:hidden fixed bottom-6 left-6 right-6 h-16 glass rounded-full shadow-2xl border border-white flex justify-around items-center px-6 z-50">
        <button onclick="switchTab('accounting')" class="text-blue-900 text-xl"><i class="fas fa-calculator"></i></button>
        <button onclick="switchTab('crm')" class="text-blue-900 text-xl"><i class="fas fa-users-cog"></i></button>
        <button onclick="switchTab('staff')" class="text-blue-900 text-xl"><i class="fas fa-id-badge"></i></button>
    </div>

    <script>
        // Database Loading
        let accDb = JSON.parse(localStorage.getItem('prerak_acc_v3')) || [];
        let crmDb = JSON.parse(localStorage.getItem('prerak_crm_v3')) || [];
        let stfDb = JSON.parse(localStorage.getItem('prerak_stf_v3')) || [];

        function switchTab(tab) {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('nav > button').forEach(b => b.classList.remove('tab-active'));
            document.getElementById('sec-' + tab).classList.remove('hidden');
            document.getElementById('btn-' + tab).classList.add('tab-active');
            renderAll();
        }

        // --- ACCOUNTING ---
        function saveAccounting() {
            const name = document.getElementById('acc_name').value;
            const amount = document.getElementById('acc_amount').value;
            const type = document.getElementById('acc_type').value;

            if(!name || !amount) return alert("नाम र रकम अनिवार्य छ!");

            accDb.unshift({ id: Date.now(), name, amount, type, date: new Date().toLocaleDateString('ne-NP') });
            localStorage.setItem('prerak_acc_v3', JSON.stringify(accDb));
            
            document.getElementById('acc_name').value = '';
            document.getElementById('acc_amount').value = '';
            renderAll();
        }

        // --- CRM ---
        function saveCRM() {
            const name = document.getElementById('crm_name').value;
            const phone = document.getElementById('crm_phone').value;
            const status = document.getElementById('crm_status').value;
            const addr = document.getElementById('crm_addr').value;

            if(!name || !phone) return alert("नाम र मोबाइल नम्बर चाहिन्छ!");

            crmDb.unshift({ id: Date.now(), name, phone, status, addr, date: new Date().toLocaleDateString('ne-NP') });
            localStorage.setItem('prerak_crm_v3', JSON.stringify(crmDb));
            
            document.getElementById('crm_name').value = '';
            document.getElementById('crm_phone').value = '';
            renderAll();
        }

        // --- STAFF ---
        function saveStaff() {
            const name = document.getElementById('stf_name').value;
            const site = document.getElementById('stf_site').value;
            const task = document.getElementById('stf_task').value;

            if(!name || !site) return alert("स्टाफ र साइटको नाम भर्नुहोस्!");

            stfDb.unshift({ id: Date.now(), name, site, task, time: new Date().toLocaleTimeString('ne-NP'), date: new Date().toLocaleDateString('ne-NP') });
            localStorage.setItem('prerak_stf_v3', JSON.stringify(stfDb));
            
            document.getElementById('stf_name').value = '';
            document.getElementById('stf_site').value = '';
            document.getElementById('stf_task').value = '';
            renderAll();
        }

        function deleteItem(type, id) {
            if(!confirm('के तपाईं यो रेकर्ड हटाउन चाहनुहुन्छ?')) return;
            if(type==='acc') accDb = accDb.filter(i => i.id !== id);
            if(type==='crm') crmDb = crmDb.filter(i => i.id !== id);
            if(type==='stf') stfDb = stfDb.filter(i => i.id !== id);
            
            localStorage.setItem('prerak_acc_v3', JSON.stringify(accDb));
            localStorage.setItem('prerak_crm_v3', JSON.stringify(crmDb));
            localStorage.setItem('prerak_stf_v3', JSON.stringify(stfDb));
            renderAll();
        }

        function renderAll() {
            // Accounting List
            const total = accDb.reduce((s, i) => s + parseFloat(i.amount), 0);
            document.getElementById('totalRev').innerText = `रू ${total.toLocaleString()}`;
            document.getElementById('totalProj').innerText = accDb.length;
            document.getElementById('acc_list').innerHTML = accDb.map(i => `
                <div class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border border-gray-50">
                    <div>
                        <h4 class="font-bold text-blue-900">${i.name}</h4>
                        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">${i.type} | ${i.date}</p>
                    </div>
                    <div class="text-right">
                        <div class="font-black text-gray-800 text-sm">रू ${parseFloat(i.amount).toLocaleString()}</div>
                        <button onclick="deleteItem('acc', ${i.id})" class="text-red-200 hover:text-red-500 transition"><i class="fas fa-trash-alt"></i></button>
                    </div>
                </div>
            `).join('');

            // CRM List
            document.getElementById('crm_list').innerHTML = crmDb.map(c => `
                <div class="bg-white p-4 rounded-3xl border border-gray-50 shadow-sm flex justify-between items-center">
                    <div>
                        <h4 class="font-bold text-gray-800 leading-none">${c.name}</h4>
                        <p class="text-xs text-blue-600 font-bold mt-1"><i class="fas fa-phone mr-1"></i> ${c.phone}</p>
                        <p class="text-[9px] text-gray-400 uppercase font-black tracking-widest mt-1">${c.addr || 'ठेगाना छैन'}</p>
                    </div>
                    <div class="text-right flex flex-col items-end gap-2">
                        <span class="text-[9px] font-black px-3 py-1 rounded-full ${c.status==='Completed'?'bg-green-100 text-green-700':'bg-orange-100 text-orange-700'}">${c.status}</span>
                        <div class="flex gap-4 text-gray-300">
                            <a href="tel:${c.phone}" class="hover:text-blue-600"><i class="fas fa-phone-alt"></i></a>
                            <button onclick="deleteItem('crm', ${c.id})" class="hover:text-red-500"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');

            // Staff List
            document.getElementById('stf_list').innerHTML = stfDb.map(s => `
                <div class="bg-white p-4 rounded-2xl border-l-8 border-green-600 shadow-sm">
                    <div class="flex justify-between items-start">
                        <div>
                            <h4 class="font-bold text-gray-800">${s.name}</h4>
                            <p class="text-[10px] text-green-700 font-bold uppercase tracking-widest"><i class="fas fa-building"></i> ${s.site} | ${s.time}</p>
                        </div>
                        <button onclick="deleteItem('stf', ${s.id})" class="text-gray-300 hover:text-red-500"><i class="fas fa-times"></i></button>
                    </div>
                    <p class="text-xs text-gray-500 mt-2 italic bg-gray-50 p-2 rounded-lg border border-gray-100">"${s.task}"</p>
                </div>
            `).join('');
        }

        function downloadBackup() {
            const data = { accounting: accDb, crm: crmDb, staff: stfDb };
            const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `Prerak_OS_Backup_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
        }

        renderAll();
    </script>
</body>
</html>
