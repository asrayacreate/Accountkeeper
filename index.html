<!DOCTYPE html>
<html lang="ne">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRERAK CRM - Final Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&family=Tiro+Devanagari+Sanskrit:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f13; --surface: #18181f; --surface2: #22222c; --border: #2e2e3a;
  --text: #f0f0f5; --muted: #8888a0; --green: #22c55e; --blue: #60a5fa;
  --red: #f87171; --yellow: #fbbf24; --radius: 12px;
  --accent: #f97316; --accent2: #fb923c; --saffron: #ff9933;
}
body.theme-blue { --accent: #2563eb; --accent2: #3b82f6; --saffron: #60a5fa; }
body.theme-green { --accent: #16a34a; --accent2: #22c55e; --saffron: #4ade80; }

* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; overflow-x:hidden; }

/* WELCOME */
#welcome-overlay { position:fixed; inset:0; z-index:9999; display:flex; align-items:center; justify-content:center; background:radial-gradient(ellipse at center,#1a0500 0%,#08000f 60%,#000 100%); }
#welcome-overlay.hide { animation:wOut 0.7s ease forwards; }
@keyframes wOut { to { opacity:0; pointer-events:none; visibility:hidden; } }
.om-glyph { font-family:'Tiro Devanagari Sanskrit',serif; font-size:clamp(5rem,20vw,10rem); line-height:1; margin-bottom:10px; background:linear-gradient(135deg,#ff9933 0%,#ffd700 40%,#ff6600 80%,#ffcc44 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; filter:drop-shadow(0 0 40px rgba(255,153,51,0.7)); }

/* SIDEBAR */
#sidebar { width:240px; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; position:fixed; height:100vh; z-index:100; transition: 0.3s; }
.logo { padding:22px; border-bottom:1px solid var(--border); }
.logo-name { font-family:'Syne',sans-serif; font-weight:800; font-size:1.4rem; color:var(--accent); }
.logo-bs { display:block; margin-top:8px; background:rgba(255,153,51,0.1); border:1px solid rgba(255,153,51,0.25); border-radius:6px; padding:4px 10px; font-size:0.72rem; color:var(--saffron); font-weight:600; }
nav { flex:1; padding:15px; }
.nav-item { display:flex; align-items:center; gap:12px; padding:10px; border-radius:8px; cursor:pointer; font-size:0.87rem; color:var(--muted); transition:0.2s; }
.nav-item:hover, .nav-item.active { background:var(--surface2); color:var(--text); }
.nav-item.active { background:var(--accent); color:white; }

/* UI ELEMENTS */
#theme-btn { margin: 15px; padding: 8px; font-size: 0.75rem; background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 8px; cursor: pointer; }
#main { margin-left:240px; flex:1; padding: 0; display:flex; flex-direction:column; }
.topbar { background:var(--bg); border-bottom:1px solid var(--border); padding:15px 30px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:50; }
.page { display:none; padding:30px; animation:fadeIn 0.3s ease; }
.page.active { display:block; }
@keyframes fadeIn { from { opacity:0; transform:translateY(10px) } to { opacity:1; transform:translateY(0) } }

.btn { padding:8px 16px; border-radius:8px; border:none; cursor:pointer; font-weight:500; font-size:0.85rem; transition:0.2s; }
.btn-primary { background:var(--accent); color:white; }
.btn-wa { background:#25D366; color:white; }
.btn-wa:hover { background:#128C7E; transform: translateY(-1px); }

table { width:100%; border-collapse:collapse; }
td, th { padding:12px 15px; text-align:left; border-bottom:1px solid var(--border); font-size:0.85rem; }
.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px; }

.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:200; align-items:center; justify-content:center; }
.modal { background:var(--surface); padding:25px; border-radius:15px; width:450px; }
#toast { position:fixed; bottom:25px; right:25px; background:var(--green); color:white; padding:12px 20px; border-radius:10px; opacity:0; transition:0.3s; z-index:999; }

@media(max-width:768px) { #sidebar { transform:translateX(-100%); } #main { margin-left:0; } }
</style>
</head>
<body>

<div id="welcome-overlay">
  <div class="w-box">
    <div class="om-glyph">ॐ</div>
    <h2 style="color:#ffd700">ॐ नमः शिवाय</h2>
    <p style="color:var(--muted); margin: 15px 0;">PRERAK Construction & Prefab Homes</p>
    <button class="enter-btn" onclick="closeWelcome()">🙏 प्रवेश गर्नुहोस्</button>
  </div>
</div>

<aside id="sidebar">
  <div class="logo">
    <div class="logo-name">PRERAK</div>
    <span class="logo-bs" id="sb-bs">बि.सं. २०८३</span>
  </div>
  <nav>
    <div class="nav-item active" onclick="navigate('dashboard',this)">🏠 Dashboard</div>
    <div class="nav-item" onclick="navigate('customers',this)">👥 Customer List</div>
    <div class="nav-item" onclick="navigate('add-customer',this)">➕ Add Customer</div>
  </nav>
  <button id="theme-btn" onclick="cycleTheme()">🎨 Change Theme</button>
</aside>

<main id="main">
  <div class="topbar">
    <h3 id="page-title">Dashboard</h3>
    <span class="bs-chip" id="tb-bs">बि.सं. लोड...</span>
  </div>

  <div class="page active" id="page-dashboard">
    <div class="card">
      <h4>Recent Activity</h4>
      <div id="act-feed" style="margin-top:15px"></div>
    </div>
  </div>

  <div class="page" id="page-customers">
    <input type="text" id="cust-search" oninput="renderCustomers()" placeholder="खोज्नुहोस्..." style="width:100%; padding:10px; margin-bottom:15px; background:var(--surface2); border:1px solid var(--border); color:white; border-radius:8px;">
    <div class="card" style="overflow-x:auto">
      <table>
        <thead><tr><th>नाम</th><th>फोन</th><th>ठेगाना</th><th>कार्य</th></tr></thead>
        <tbody id="cust-table"></tbody>
      </table>
    </div>
  </div>

  <div class="page" id="page-add-customer">
    <div class="card" style="max-width:500px; margin:auto;">
      <h3>नयाँ ग्राहक</h3>
      <div style="display:flex; flex-direction:column; gap:15px; margin-top:15px;">
        <input type="text" id="c-name" placeholder="पुरा नाम" style="padding:10px; background:var(--surface2); border:1px solid var(--border); color:white; border-radius:5px;">
        <input type="tel" id="c-phone" placeholder="फोन नम्बर" style="padding:10px; background:var(--surface2); border:1px solid var(--border); color:white; border-radius:5px;">
        <input type="text" id="c-address" placeholder="ठेगाना" style="padding:10px; background:var(--surface2); border:1px solid var(--border); color:white; border-radius:5px;">
        <button class="btn btn-primary" onclick="addCustomer()">सुरक्षित गर्नुहोस्</button>
      </div>
    </div>
  </div>
</main>

<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <h3>✏️ सम्पादन गर्नुहोस्</h3>
    <div style="display:flex; flex-direction:column; gap:15px; margin-top:20px;">
      <input type="text" id="e-name" style="padding:10px; background:var(--surface2); border:1px solid var(--border); color:white; border-radius:5px;">
      <input type="tel" id="e-phone" style="padding:10px; background:var(--surface2); border:1px solid var(--border); color:white; border-radius:5px;">
      <input type="text" id="e-address" style="padding:10px; background:var(--surface2); border:1px solid var(--border); color:white; border-radius:5px;">
      <div style="display:flex; gap:10px;">
        <button class="btn btn-primary" style="flex:1" onclick="saveEdit()">Update</button>
        <button class="btn" style="background:var(--border); color:white;" onclick="closeModal()">रद्द</button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// DATA
let customers = JSON.parse(localStorage.getItem('pk_customers') || '[]');
let activities = JSON.parse(localStorage.getItem('pk_activities') || '[]');

function save() {
    localStorage.setItem('pk_customers', JSON.stringify(customers));
    localStorage.setItem('pk_activities', JSON.stringify(activities));
}

function toast(m) {
    const t = document.getElementById('toast'); t.textContent = m; t.style.opacity = '1';
    setTimeout(() => t.style.opacity = '0', 2000);
}

// NAVIGATION
function navigate(page, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + page).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    if(el) el.classList.add('active');
    document.getElementById('page-title').textContent = page.charAt(0).toUpperCase() + page.slice(1);
    if(page === 'dashboard') renderDashboard();
    if(page === 'customers') renderCustomers();
}

// SMART WHATSAPP MESSAGE (WITH DIGITAL CARD LINK)
function sendWA(phone, name) {
    const bizName = "*PRERAK Construction & Prefab Homes*";
    const services = "UPVC Doors, Aluminium, AAC Blocks, Prefab Homes";
    const siteLink = "https://prerakconstruction.com.np"; // तपाईंको वेबसाइट वा डिजिटल कार्ड लिंक यहाँ राख्नुहोस्

    let msg = `*नमस्ते ${name} सर,* 🙏\n\n`;
    msg += `म *${bizName}* बाट बोलिरहेको छु।\n\n`;
    msg += `हजुरले सोध्नुभएको कार्यको बारेमा थप विवरण यहाँ हेर्न सक्नुहुन्छ:\n🔗 ${siteLink}\n\n`;
    msg += `*हाम्रा सेवाहरू:*\n🏗️ ${services}\n📍 Hetauda-2, Kantirajpath\n\n`;
    msg += `हामीलाई सम्झनुभएकोमा धन्यवाद!`;

    window.open(`https://wa.me/977${phone}?text=${encodeURIComponent(msg)}`, '_blank');
}

// RENDER FUNCTIONS
function renderCustomers() {
    const q = document.getElementById('cust-search').value.toLowerCase();
    const filtered = customers.filter(c => c.name.toLowerCase().includes(q) || c.phone.includes(q));
    document.getElementById('cust-table').innerHTML = filtered.map(c => `
        <tr>
            <td>${c.name}</td><td>${c.phone}</td><td>${c.address || '—'}</td>
            <td>
                <button class="btn btn-wa" onclick="sendWA('${c.phone}', '${c.name}')">WA</button>
                <button class="btn btn-primary" style="padding:5px 10px;" onclick="openEdit('${c.id}')">✏️</button>
            </td>
        </tr>
    `).join('');
}

function renderDashboard() {
    document.getElementById('act-feed').innerHTML = activities.map(a => `<div>● ${a.text} <small style="color:var(--muted)">(${a.time})</small></div>`).join('') || 'No activity';
}

function addCustomer() {
    const name = document.getElementById('c-name').value;
    const phone = document.getElementById('c-phone').value;
    if(!name || !phone) return toast('विवरण भर्नुहोस्!');
    customers.push({ id: Date.now().toString(), name, phone, address: document.getElementById('c-address').value });
    activities.unshift({ text: `नयाँ ग्राहक: ${name}`, time: new Date().toLocaleTimeString() });
    save(); navigate('customers'); toast('✅ सुरक्षित भयो!');
}

let editId = null;
function openEdit(id) {
    const c = customers.find(x => x.id === id);
    if(!c) return;
    editId = id;
    document.getElementById('e-name').value = c.name;
    document.getElementById('e-phone').value = c.phone;
    document.getElementById('e-address').value = c.address || '';
    document.getElementById('edit-modal').style.display = 'flex';
}

function saveEdit() {
    const c = customers.find(x => x.id === editId);
    if(c) {
        c.name = document.getElementById('e-name').value;
        c.phone = document.getElementById('e-phone').value;
        c.address = document.getElementById('e-address').value;
        save(); renderCustomers(); closeModal(); toast('✅ अपडेट भयो!');
    }
}

function closeModal() { document.getElementById('edit-modal').style.display = 'none'; }

// THEME CHANGER
let themes = ['', 'theme-blue', 'theme-green'];
let currentTheme = 0;
function cycleTheme() {
    currentTheme = (currentTheme + 1) % themes.length;
    document.body.className = themes[currentTheme];
    toast('🎨 Theme Updated');
}

function closeWelcome() { document.getElementById('welcome-overlay').classList.add('hide'); }

// INIT
(function init() {
    document.getElementById('tb-bs').textContent = "बि.सं. २०८३ बैशाख";
    renderDashboard();
})();
</script>
</body>
</html>
