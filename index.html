<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AccountKeer Pro | Prerak Multipurpose</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Mukta:wght@300;400;600;700&display=swap');
        body { font-family: 'Mukta', sans-serif; }
        .glass-effect { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 pb-20">

    <nav class="bg-blue-800 text-white p-4 sticky top-0 z-50 shadow-md">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i class="fas fa-hammer text-2xl"></i>
                <div>
                    <h1 class="font-bold leading-none">PRERAK</h1>
                    <span class="text-[10px] uppercase tracking-widest text-blue-200">Multipurpose v3</span>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="exportData()" class="text-xs bg-blue-700 px-3 py-1 rounded border border-blue-500 hover:bg-blue-600">
                    <i class="fas fa-download"></i> Export
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 space-y-6">

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="bg-white p-4 rounded-2xl shadow-sm border-b-4 border-blue-600">
                <p class="text-xs text-gray-500 font-bold uppercase">जम्मा प्रोजेक्ट</p>
                <h2 id="totalProjects" class="text-2xl font-black text-blue-800">०</h2>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border-b-4 border-green-600">
                <p class="text-xs text-gray-500 font-bold uppercase">कुल आम्दानी</p>
                <h2 id="totalRevenue" class="text-2xl font-black text-green-700">रू ०</h2>
            </div>
            </div>

        <section class="bg-white rounded-3xl p-6 shadow-xl border border-gray-200">
            <h3 class="text-lg font-bold mb-5 flex items-center gap-2 text-gray-700">
                <i class="fas fa-pen-nib text-blue-600"></i> नयाँ काम इन्ट्री गर्नुहोस्
            </h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="custName" placeholder="ग्राहकको नाम" class="p-3 bg-gray-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                <input type="text" id="custAddress" placeholder="ठेगाना" class="p-3 bg-gray-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                <select id="serviceType" class="p-3 bg-gray-50 border rounded-xl outline-none">
                    <option value="UPVC">UPVC झ्याल/ढोका</option>
                    <option value="Interior">इन्टेरियर डिजाइन</option>
                    <option value="AAC">AAC ब्लक डेलिभरी</option>
                    <option value="Modular">मोडुलर फर्निचर</option>
                </select>
                <input type="number" id="totalAmount" placeholder="कुल रकम (रू)" class="p-3 bg-gray-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <button onclick="saveRecord()" class="w-full mt-6 bg-blue-800 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-blue-900 transition-all active:scale-95">
                <i class="fas fa-save mr-2"></i> सुरक्षित गर्नुहोस्
            </button>
        </section>

        <section class="bg-white rounded-3xl shadow-sm overflow-hidden">
            <div class="p-5 border-b flex justify-between items-center bg-gray-50">
                <h3 class="font-bold text-gray-700">हालका रेकर्डहरू</h3>
                <span class="text-xs text-blue-600 font-bold" id="recordCount">० वटा</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-gray-100 text-[11px] uppercase text-gray-400">
                        <tr>
                            <th class="p-4">ग्राहक</th>
                            <th class="p-4">सेवा</th>
                            <th class="p-4">रकम</th>
                            <th class="p-4">एक्सन</th>
                        </tr>
                    </thead>
                    <tbody id="recordTableBody" class="text-sm divide-y divide-gray-100">
                        </tbody>
                </table>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-4 left-4 right-4 h-16 bg-white/80 backdrop-blur-xl border border-white rounded-full shadow-2xl flex justify-around items-center px-6 md:hidden">
        <button class="text-blue-800 flex flex-col items-center"><i class="fas fa-th-large"></i></button>
        <button onclick="window.scrollTo(0,0)" class="bg-blue-800 text-white h-12 w-12 rounded-full -mt-10 shadow-lg flex items-center justify-center border-4 border-gray-100"><i class="fas fa-plus"></i></button>
        <button class="text-gray-400 flex flex-col items-center"><i class="fas fa-history"></i></button>
    </nav>

    <script>
        let records = JSON.parse(localStorage.getItem('prerak_records')) || [];

        function updateDashboard() {
            document.getElementById('totalProjects').innerText = records.length;
            const revenue = records.reduce((sum, r) => sum + parseFloat(r.amount || 0), 0);
            document.getElementById('totalRevenue').innerText = 'रू ' + revenue.toLocaleString();
            renderTable();
        }

        function saveRecord() {
            const name = document.getElementById('custName').value;
            const amount = document.getElementById('totalAmount').value;
            const service = document.getElementById('serviceType').value;

            if(!name || !amount) return alert("कृपया नाम र रकम भर्नुहोस्!");

            const newEntry = {
                id: Date.now(),
                name: name,
                amount: amount,
                service: service,
                date: new Date().toLocaleDateString('ne-NP')
            };

            records.unshift(newEntry);
            localStorage.setItem('prerak_records', JSON.stringify(records));
            updateDashboard();
            
            // Clear inputs
            document.getElementById('custName').value = '';
            document.getElementById('totalAmount').value = '';
        }

        function renderTable() {
            const body = document.getElementById('recordTableBody');
            body.innerHTML = records.map(r => `
                <tr class="hover:bg-gray-50 transition">
                    <td class="p-4 font-bold text-blue-900">${r.name}</td>
                    <td class="p-4"><span class="bg-blue-50 text-blue-600 text-[10px] font-bold px-2 py-1 rounded-md">${r.service}</span></td>
                    <td class="p-4 font-black">रू ${parseFloat(r.amount).toLocaleString()}</td>
                    <td class="p-4">
                        <button onclick="deleteRecord(${r.id})" class="text-red-400 hover:text-red-600"><i class="fas fa-trash-alt"></i></button>
                    </td>
                </tr>
            `).join('');
            document.getElementById('recordCount').innerText = records.length + " वटा";
        }

        function deleteRecord(id) {
            if(confirm('के तपाईं यो रेकर्ड हटाउन चाहनुहुन्छ?')) {
                records = records.filter(r => r.id !== id);
                localStorage.setItem('prerak_records', JSON.stringify(records));
                updateDashboard();
            }
        }

        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(records));
            const dlAnchorElem = document.createElement('a');
            dlAnchorElem.setAttribute("href", dataStr);
            dlAnchorElem.setAttribute("download", "prerak_backup.json");
            dlAnchorElem.click();
        }

        // Initial Load
        updateDashboard();
    </script>
</body>
</html>
