<script>
"use strict";
/* ================================================================
   PRERAK CRM v3.9.1 — Final Master Code
   Fixes: Address z-index, Quotation Table Overflow, Calendar Month Bug
   ================================================================ */

/* तपाईंको पहिलेकै लामा डाटाहरू (PRINT_CSS, COMPANY_DEFAULT, BS_TABLE, SERVICE_DATA, DEFAULT_TEMPLATES, DEFAULT_RATES) यहाँ जस्ताको तस्तै राख्नुस् */

var STORE = {
  keys:{
    customers:'pk3_customers',quotations:'pk3_quotations',followups:'pk3_followups',
    daybook:'pk3_daybook',rates:'pk3_rates',walkins:'pk3_walkins',
    staff:'pk3_staff',stock:'pk3_stock',stockHistory:'pk3_stockHistory',
    sales:'pk3_sales',templates:'pk3_templates',bulkFolders:'pk3_bulkFolders',
    users:'pk3_users',audit:'pk3_audit',invoices:'pk3_invoices',
    ledger:'pk3_ledger',notif:'pk3_notif',activity:'pk3_activity',
    company:'pk3_company',settings:'pk3_settings',tracker:'pk3_tracker',
    vcard:'pk3_vcard',estimates:'pk3_estimates'
  },
  _cache:{},_cacheHit:{},
  _resolveKey:function(k){return this.keys[k]||k;},
  get:function(key,def){
    var lk=this._resolveKey(key);
    if(this._cacheHit[lk]){var v=this._cache[lk];return(v!==null&&v!==undefined)?v:(def!==undefined?def:null);}
    try{var raw=localStorage.getItem(lk);var parsed=raw?JSON.parse(raw):null;this._cache[lk]=parsed;this._cacheHit[lk]=true;return parsed!==null?parsed:(def!==undefined?def:null);}
    catch(e){this._cacheHit[lk]=true;this._cache[lk]=null;return def!==undefined?def:null;}
  },
  set:function(key,val){
    var lk=this._resolveKey(key);this._cache[lk]=val;this._cacheHit[lk]=true;
    try{localStorage.setItem(lk,JSON.stringify(val));return true;}
    catch(e){
      if(e.name==='QuotaExceededError'){
        // Storage फुल भएमा पुराना अटो-क्लियर गर्ने लजिक
        var acts = localStorage.getItem('pk3_activity');
        if(acts) localStorage.removeItem('pk3_activity');
        if(typeof App!=='undefined') App.toast('⚠️ Storage भरियो! पुराना Activity मेटाइयो। Backup गर्नुस्।','error');
      }
      return false;
    }
  },
  remove:function(key){var lk=this._resolveKey(key);delete this._cache[lk];delete this._cacheHit[lk];try{localStorage.removeItem(lk);return true;}catch(e){return false;}},
  invalidate:function(key){if(key){var lk=this._resolveKey(key);delete this._cache[lk];delete this._cacheHit[lk];}else{this._cache={};this._cacheHit={};}},
  migrate:function(){
    if(localStorage.getItem('pk3_migrated_v25'))return;
    var map={'pk_customers':'pk3_customers','pk_quotations':'pk3_quotations','pk_followups':'pk3_followups','pk_daybook':'pk3_daybook','pk_rates':'pk3_rates','pk_staff':'pk3_staff','pk_stock':'pk3_stock','pk_sales':'pk3_sales','pk_templates':'pk3_templates','pk_users':'pk3_users','pk_audit':'pk3_audit'};
    Object.keys(map).forEach(function(ok){var data=localStorage.getItem(ok);if(data&&!localStorage.getItem(map[ok]))localStorage.setItem(map[ok],data);});
    localStorage.setItem('pk3_migrated_v25','1');
  }
};

/* =========== DATE UTILITIES (तपाईंको पहिलेकै) =========== */
/* (यहाँ BS_YEAR_START_AD र मिति परिवर्तन गर्ने कोड जस्ताको तस्तै राख्नुस्) */

/* =========== BSPICKER (सुधारिएको) =========== */
var BSPicker = {
  open:function(targetId,label){
    _bsTarget=targetId;var today=todayBS();
    var hb=document.getElementById(targetId+'-bs');
    if(hb&&hb.value){var pts=hb.value.split('/');_bsCurrentY=parseInt(pts[0]);_bsCurrentM=parseInt(pts[1]);}
    else{_bsCurrentY=today.y;_bsCurrentM=today.m;}
    this.render();document.getElementById('bs-picker-overlay').classList.add('open');
  },
  close:function(){document.getElementById('bs-picker-overlay').classList.remove('open');_bsTarget=null;},
  changeMonth:function(dir){_bsCurrentM+=dir;if(_bsCurrentM>12){_bsCurrentM=1;_bsCurrentY++;}if(_bsCurrentM<1){_bsCurrentM=12;_bsCurrentY--;}if(!BS_TABLE[_bsCurrentY]){_bsCurrentY-=dir;_bsCurrentM-=dir;return;}this.render();},
  selectToday:function(){var t=todayBS();_bsCurrentY=t.y;_bsCurrentM=t.m;this._pick(t.y,t.m,t.d);},
  render:function(){
    if(!BS_TABLE[_bsCurrentY])return;
    var today=todayBS();
    // ✅ FIX 3: महिना नदेखाउने समस्याको समाधान (today.m थपियो)
    var _safeM=Math.max(1,Math.min(12,parseInt(_bsCurrentM)||today.m));
    document.getElementById('bsp-title').textContent=(BS_MONTHS[_safeM-1]||'बैशाख')+' '+(_bsCurrentY||today.y);
    var grid=document.getElementById('bsp-grid');var html='';
    BS_DAYS.forEach(function(d,i){html+='<div class="bs-day-head'+(i===0?' sun':'')+'">'+d+'</div>';});
    var firstAD=bsToAD(_bsCurrentY,_safeM,1);var firstDow=firstAD.getDay();
    for(var i=0;i<firstDow;i++)html+='<div class="bs-day empty"></div>';
    var _safeY=_bsCurrentY||2082;var mdays=(BS_TABLE[_safeY]&&BS_TABLE[_safeY][_safeM-1])||30;
    var sel=null;if(_bsTarget){var hb=document.getElementById(_bsTarget+'-bs');if(hb&&hb.value){var p=hb.value.split('/');sel={y:parseInt(p[0]),m:parseInt(p[1]),d:parseInt(p[2])};}}
    for(var d=1;d<=mdays;d++){var cls='bs-day';var dow=(firstDow+d-1)%7;if(dow===0)cls+=' sun';if(today.y===_bsCurrentY&&today.m===_safeM&&today.d===d)cls+=' today';if(sel&&sel.y===_bsCurrentY&&sel.m===_safeM&&sel.d===d)cls+=' selected';html+='<div class="'+cls+'" onclick="BSPicker._pick('+_bsCurrentY+','+_safeM+','+d+')">'+d+'</div>';}
    grid.innerHTML=html;
  },
  _pick:function(y,m,d){
    if(!_bsTarget)return;var ad=bsToAD(y,m,d);
    var h=document.getElementById(_bsTarget);if(h)h.value=fmt(ad);
    var hb=document.getElementById(_bsTarget+'-bs');if(hb)hb.value=y+'/'+pad(m)+'/'+pad(d);
    var textEl=document.getElementById(_bsTarget+'-text');if(textEl){textEl.textContent='📅 '+BS_MONTHS[m-1]+' '+d+', '+y+' ('+fmtDisplayDate(ad)+')';}
    var disp=textEl?textEl.closest('.bs-picker-display'):null;if(disp)disp.classList.add('has-value');
    this.close();
  }
};

/* =========== QUOTATIONS (सुधारिएको) =========== */
var Quotations = {
  _rows:[],
  getAll:function(){return STORE.get('quotations',[])||[];},
  /* (तपाईंको पहिलेकै Quotations का अरू सबै function हरू यहाँ जस्ताको तस्तै राख्नुस्) */
  preview:function(id,theme){
    var q=this.getAll().find(function(x){return x.id===id;});if(!q)return;
    theme=theme||STORE.get('quot_preview_theme','classic');
    var co=STORE.get('company',COMPANY_DEFAULT);
    var sub=(q.rows||[]).reduce(function(s,r){return s+(parseFloat(r.qty)||0)*(parseFloat(r.rate)||0);},0);
    var disc=parseFloat(q.discount)||0;
    var tax=parseFloat(q.tax)||0;
    var taxAmt=Math.round((sub-disc)*tax/100);
    var total=parseFloat(q.amount)||Math.round(sub-disc+taxAmt);
    var adv=parseFloat(q.advance)||0;
    var bal=total-adv;
    
    var themes={
      classic:{bg:'#fff',accent:'#c0392b',head:'#2c3e50',border:'#2c3e50',tableHead:'#2c3e50',tableHeadTxt:'#fff',font:'Georgia,serif',logoBg:'#2c3e50',logoTxt:'#fff',name:'🏛️ Classic'},
      modern:{bg:'#fafafa',accent:'#f97316',head:'#1e293b',border:'#f97316',tableHead:'#f97316',tableHeadTxt:'#fff',font:'Arial,sans-serif',logoBg:'linear-gradient(135deg,#f97316,#ea580c)',logoTxt:'#fff',name:'⚡ Modern'},
      bold:{bg:'#fff',accent:'#7c3aed',head:'#1e1b4b',border:'#7c3aed',tableHead:'#7c3aed',tableHeadTxt:'#fff',font:'system-ui,sans-serif',logoBg:'linear-gradient(135deg,#7c3aed,#4f46e5)',logoTxt:'#fff',name:'🎨 Bold'},
      nepali:{bg:'#fffbf0',accent:'#b45309',head:'#78350f',border:'#d97706',tableHead:'#92400e',tableHeadTxt:'#fef3c7',font:'system-ui,sans-serif',logoBg:'linear-gradient(135deg,#d97706,#b45309)',logoTxt:'#fff',name:'🇳🇵 Nepali'}
    };
    var t=themes[theme]||themes.classic;
    
    var h='<div id="quot-preview-wrap" style="background:'+t.bg+';color:#000;font-family:'+t.font+';max-width:780px;margin:0 auto;padding:0;">';
    // Theme switcher
    h+='<div style="display:flex;gap:6px;padding:10px 16px;background:var(--surface-2);border-bottom:1px solid var(--border);flex-wrap:wrap;">';
    Object.keys(themes).forEach(function(k){
      h+='<button data-theme="'+k+'" data-id="'+id+'" onclick="Quotations.preview(this.dataset.id,this.dataset.theme)" '+
        'style="padding:4px 10px;border-radius:20px;border:2px solid '+(k===theme?t.accent:'#ccc')+';background:'+(k===theme?t.accent:'transparent')+';color:'+(k===theme?'#fff':'#666')+';font-size:0.72rem;cursor:pointer;">'+themes[k].name+'</button>';
    });
    h+='</div>';
    
    // Header & Customer Info (तपाईंको पहिलेकै कोड)
    h+='<div style="padding:24px 28px 18px;background:'+t.bg+';">';
    h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;">';
    h+='<div style="display:flex;align-items:center;gap:14px;">';
    h+='<div style="width:56px;height:56px;border-radius:10px;background:'+t.logoBg+';display:flex;align-items:center;justify-content:center;font-size:1.4rem;color:'+t.logoTxt+';font-weight:900;flex-shrink:0;">P</div>';
    h+='<div><div style="font-size:1.1rem;font-weight:900;color:'+t.head+';letter-spacing:0.5px;">'+esc(co.name||'')+'</div>';
    h+='<div style="font-size:0.72rem;color:#666;margin-top:2px;">'+esc(co.address||'')+'</div>';
    h+='<div style="font-size:0.72rem;color:#666;">📞 '+esc(co.phone1||'')+(co.phone2?' / '+esc(co.phone2):'')+'</div></div></div>';
    h+='<div style="text-align:right;"><div style="font-size:1.5rem;font-weight:900;letter-spacing:3px;color:'+t.accent+';border:3px solid '+t.accent+';padding:4px 16px;border-radius:6px;">QUOTATION</div>';
    h+='<div style="font-size:0.75rem;color:#888;margin-top:6px;">Date: '+esc(q.bs_date||'-')+'</div>';
    h+='</div></div>';
    h+='<div style="height:3px;background:'+t.accent+';border-radius:2px;margin-bottom:16px;"></div>';
    h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;">';
    h+='<div style="padding:10px 14px;background:rgba(0,0,0,0.03);border-left:4px solid '+t.accent+';border-radius:0 8px 8px 0;">';
    h+='<div style="font-size:0.65rem;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;">Bill To</div>';
    h+='<div style="font-weight:800;font-size:0.95rem;color:'+t.head+';">'+esc(q.cust_name||'')+'</div>';
    if(q.cust_phone)h+='<div style="font-size:0.78rem;color:#555;">📞 '+esc(q.cust_phone)+'</div>';
    h+='</div>';
    h+='<div style="padding:10px 14px;background:rgba(0,0,0,0.03);border-left:4px solid '+t.border+';border-radius:0 8px 8px 0;">';
    h+='<div style="font-size:0.65rem;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;">Service</div>';
    h+='<div style="font-weight:700;color:'+t.head+';">'+esc(q.work||'')+(q.subwork?' <span style="color:'+t.accent+';">/ '+esc(q.subwork)+'</span>':'')+'</div>';
    h+='</div></div>';

    // ✅ FIX 2: मोबाइलमा टेबल नकाटिने गराउन <div style="overflow-x:auto;"> थपियो
    h+='<div style="overflow-x:auto;"><table style="width:100%;min-width:550px;border-collapse:collapse;font-size:0.82rem;margin-bottom:14px;">';
    h+='<thead><tr style="background:'+t.tableHead+';color:'+t.tableHeadTxt+';">';
    ['SN','Item / Description','Qty','Unit','Rate (Rs.)','Amount (Rs.)'].forEach(function(col,ci){
      var align=ci>=4?'right':'left';var w=ci===0?'40px':ci===1?'auto':ci>=4?'100px':'60px';
      h+='<th style="padding:8px 10px;text-align:'+align+';width:'+w+';font-weight:700;white-space:nowrap;">'+col+'</th>';
    });
    h+='</tr></thead><tbody>';
    (q.rows||[]).forEach(function(r,ri){
      var amt=(parseFloat(r.qty)||0)*(parseFloat(r.rate)||0);
      var rowBg=ri%2===0?'rgba(0,0,0,0.01)':'rgba(0,0,0,0.03)';
      h+='<tr style="border-bottom:1px solid #e5e7eb;background:'+rowBg+';">';
      h+='<td style="padding:8px 10px;text-align:center;color:#888;">'+(ri+1)+'</td>';
      h+='<td style="padding:8px 10px;font-weight:600;">'+esc(r.name||'')+'</td>';
      h+='<td style="padding:8px 10px;text-align:center;">'+esc(String(r.qty||0))+'</td>';
      h+='<td style="padding:8px 10px;text-align:center;color:#888;">'+esc(r.unit||'')+'</td>';
      h+='<td style="padding:8px 10px;text-align:right;">'+fmtRs(r.rate||0)+'</td>';
      h+='<td style="padding:8px 10px;text-align:right;font-weight:700;">'+fmtRs(amt)+'</td>';
      h+='</tr>';
    });
    h+='</tbody></table></div>';
    
    // Totals & Footer
    h+='<div style="display:flex;justify-content:flex-end;margin-bottom:14px;">';
    h+='<div style="min-width:240px;">';
    var rows2=[['Subtotal',fmtRs(sub)]];
    if(disc>0)rows2.push(['Discount (-)','- '+fmtRs(disc)]);
    if(tax>0)rows2.push(['Tax ('+tax+'%)',fmtRs(taxAmt)]);
    rows2.forEach(function(r){
      h+='<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #f0f0f0;font-size:0.82rem;"><span style="color:#666;">'+r[0]+'</span><span>'+r[1]+'</span></div>';
    });
    h+='<div style="display:flex;justify-content:space-between;padding:10px 0 6px;border-top:2px solid '+t.accent+';margin-top:4px;"><strong style="font-size:0.95rem;color:'+t.head+';">TOTAL</strong><strong style="font-size:1.15rem;color:'+t.accent+';">'+fmtRs(total)+'</strong></div>';
    if(adv>0){h+='<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:0.82rem;"><span style="color:#10b981;">💵 Advance Paid</span><span style="color:#10b981;font-weight:700;">'+fmtRs(adv)+'</span></div>';
    h+='<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:0.82rem;"><span style="color:#ef4444;">🔴 Balance Due</span><span style="color:#ef4444;font-weight:700;">'+fmtRs(bal)+'</span></div>';}
    h+='</div></div>';
    if(q.details)h+='<div style="padding:10px 14px;background:rgba(0,0,0,0.03);border-left:4px solid '+t.accent+';border-radius:0 8px 8px 0;margin-bottom:14px;font-size:0.8rem;"><strong>Notes:</strong> '+esc(q.details)+'</div>';
    h+='<div style="border-top:2px solid '+t.accent+';padding-top:12px;text-align:center;">';
    h+='<div style="font-size:0.78rem;color:#888;font-style:italic;">धन्यवाद! — "'+esc(co.tagline||'Building Your Dreams')+'" 🏠</div>';
    if(co.email)h+='<div style="font-size:0.7rem;color:#aaa;margin-top:3px;">✉ '+esc(co.email)+'</div>';
    h+='</div></div></div>';
    
    var body=document.getElementById('bk-preview-body');
    if(!body)return;
    body.innerHTML=h;
    App.openModal('bk-preview-modal');
  }
};

/* =========== AI ASSISTANT (सुधारिएको) =========== */
var AIAssistant = {
  _apiKey:null,_provider:'anthropic',_model:'claude-sonnet-4-6',_history:[],
  /* (अरू सबै कोड उस्तै) */
  send:function(){
    var self=this;if(this._isStreaming)return;var inp=document.getElementById('ai-input');
    if(!inp||!inp.value.trim())return;if(!this._apiKey){App.toast('API key चाहिन्छ','error');return;}
    var text=inp.value.trim();inp.value='';
    this._history.push({role:'user',content:text,time:Date.now()});
    STORE.set('aiChatHistory',this._history);
    this._appendMessage(this._history[this._history.length-1]);
    this._showTyping();this._isStreaming=true;
    
    this._callAPI(text).then(function(response){
      // ✅ FIX 4: Typing सधैँ लुक्ने बनाइयो
      self._hideTyping();
      self._history.push({role:'assistant',content:response,time:Date.now()});
      STORE.set('aiChatHistory',self._history);
      self._appendMessage(self._history[self._history.length-1]);
      self._isStreaming=false;
    }).catch(function(err){
      self._hideTyping();
      self._isStreaming=false;
      console.error('AI error:',err);
      var errMsg='❌ Error: '+(err.message||'API failed');
      self._history.push({role:'assistant',content:errMsg,time:Date.now()});
      STORE.set('aiChatHistory',self._history);
      self._appendMessage(self._history[self._history.length-1]);
    });
  }
  // (अरू सबै कोड उस्तै)
};

/* तपाईंको बाँकी रहेका सम्पूर्ण JavaScript कोडहरू (App, Auth, Customers, Ledger, DayBook, Staff, Stock आदि) यहाँ जस्ताको तस्तै राख्नुस् */

// Initialize
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', bootCRM);
} else {
  bootCRM();
}
</script>
