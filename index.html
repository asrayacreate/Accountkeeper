<!DOCTYPE html>
<html lang="ne">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRERAK CRM - Masterpiece v2</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Syne:wght@700;800&family=Tiro+Devanagari+Sanskrit&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050508; --panel: #11111a; --border: #222230;
  --accent: #ff5f1f; --green: #22c55e; --text: #ffffff;
  --muted: #94a3b8; --grad: linear-gradient(135deg, #ff5f1f 0%, #ff2e00 100%);
}

* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; overflow-x: hidden; }

/* WELCOME OVERLAY */
#welcome-overlay { position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; background: #000; transition: 0.8s ease; }
#welcome-overlay.hide { opacity: 0; pointer-events: none; transform: scale(1.1); }
.om-glyph { font-family: 'Tiro Devanagari Sanskrit', serif; font-size: 8rem; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 30px rgba(255, 95, 31, 0.4)); animation: pulse 3s infinite; }
@keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

/* SIDEBAR */
#sidebar { width: 260px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 100; transition: 0.3s; }
.logo-box { padding: 30px 20px; border-bottom: 1px solid var(--border); }
.logo-title { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; color: var(--accent); }
nav { flex: 1; padding: 20px 10px; }
.nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 15px; border-radius: 12px; color: var(--muted); cursor: pointer; transition: 0.3s; margin-bottom: 5px; }
.nav-item:hover, .nav-item.active { background: rgba(255, 95, 31, 0.1); color: #fff; }
.nav-item.active { background: var(--grad); color: white; box-shadow: 0 5px 15px rgba(255, 95, 31, 0.3); }

/* MAIN CONTENT */
#main { margin-left: 260px; flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
.top-nav { padding: 20px 30px; background: rgba(5, 5, 8, 0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 50; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.page { display: none; padding: 30px; animation: fadeInUp 0.5s ease forwards; }
.page.active { display: block; }
@keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

/* CARDS & TABLES */
.card { background: var(--panel); border: 1px solid var(--border); border-radius: 20px; padding: 25px; margin-bottom: 20px; }
table { width: 100%; border-collapse: collapse; margin-top: 15px; }
th { text-align: left; color: var(--muted); font-size: 0.75rem; text-transform: uppercase; padding: 12px; border-bottom: 1px solid var(--border); }
td { padding: 15px 12px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
.btn { padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer; font-weight: 600; transition: 0.3s; }
.btn-primary { background: var(--grad); color: white; }
.btn-wa { background: #25D366; color: white; }
input { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 10px; color: white; }

#toast { position: fixed; bottom: 30px; right: 30px; background: white; color: black; padding: 15px 25px; border-radius: 12px; font-weight: 600; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transform: translateY(100px); transition: 0.4s; z-index: 999; }
#toast.show { transform: translateY(0); }

@media (max-width: 768px) { #sidebar { transform: translateX(-100%); } #main { margin-left: 0; } }
</style>
</head>
<body>

<div id="welcome-overlay">
  <div style="text-align: center;">
    <div class="om-glyph">ॐ</div>
    <h1 style="color: #ffd700; margin-top: 20px;">ॐ नमः शिवाय</h1>
    <p style="color: var(--muted); margin-top: 10px;">PRERAK CRM - सुभ बिहानी साथी!</p>
    <button class="btn btn-primary" onclick="closeWelcome()" style="margin-top: 40px; border-radius: 50px; padding: 15px 40px;">🙏 प्रवेश गर्नुहोस्</button>
  </div>
</div>

<aside id="sidebar">
  <div class="logo-box"><div class="logo-title">PRERAK<span>.</span></div><p style="font-size: 0.7rem; color: var(--muted);">ACCOUNTKEER v2</p></div>
  <nav>
    <div class="nav-item active" onclick="navigate('dash', this)">🏠 ड्यासबोर्ड</div>
    <div class="nav-item" onclick="navigate('cust', this)">👥 ग्राहकहरू</div>
    <div class="nav-item" onclick="navigate('add', this)">✨ नयाँ थप्नुहोस्</div>
  </nav>
</aside>

<main id="main">
  <div class="top-nav">
    <h3 id="page-title">ड्यासबोर्ड</h3>
    <span id="bs-clock" style="color: var(--accent); font-weight: bold;">बि.सं. २०८३ बैशाख</span>
  </div>

  <div class="page active" id="page-dash">
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;">
      <div class="card">
        <p style="color: var(--muted); font-size: 0.8rem;">कुल ग्राहक</p>
        <h1 id="stat-total" style="font-size: 3rem; color: var(--accent); margin-top: 10px;">0</h1>
      </div>
      <div class="card">
        <p style="color: var(--muted); font-size: 0.8rem;">आजको मिति</p>
        <h3 id="nepali-date" style="margin-top: 10px;">बैशाख ०५, २०८३</h3>
      </div>
    </div>
  </div>

  <div class="page" id="page-cust">
    <div class="card">
      <input type="text" id="search" oninput="render()" placeholder="नाम वा फोनबाट खोज्नुहोस्...">
      <div style="overflow-x: auto;"><table id="cust-table"><thead><tr><th>नाम</th><th>सम्पर्क</th><th>एक्सन</th></tr></thead><tbody id="cust-body"></tbody></table></div>
    </div>
  </div>

  <div class="page" id="page-add">
    <div class="card" style="max-width: 500px; margin: auto;">
      <h2 style="margin-bottom: 25px;">नयाँ ग्राहक विवरण</h2>
      <label style="color: var(--muted); font-size: 0.75rem;">पुरा नाम</label><input type="text" id="c-name" style="margin-bottom: 20px;">
      <label style="color: var(--muted); font-size: 0.75rem;">फोन नम्बर</label><input type="tel" id="c-phone" style="margin-bottom: 30px;">
      <button class="btn btn-primary" onclick="add()" style="width: 100%;">सुरक्षित गर्नुहोस् ➔</button>
    </div>
  </div>
</main>

<div id="toast">✅ सुरक्षित भयो!</div>

<script>
let customers = JSON.parse(localStorage.getItem('p_master_cust') || '[]');

function save() { localStorage.setItem('p_master_cust', JSON.stringify(customers)); }
function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }

function navigate(page, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('page-title').textContent = el.textContent;
  if(page === 'dash') updateDash();
  if(page === 'cust') render();
}

function add() {
  const n = document.getElementById('c-name').value, p = document.getElementById('c-phone').value;
  if(!n || !p) return showToast('नाम र फोन अनिवार्य छ!');
  customers.push({ id: Date.now(), name: n, phone: p });
  save(); showToast('✅ ग्राहक सुरक्षित भयो!');
  document.getElementById('c-name').value = ''; document.getElementById('c-phone').value = '';
  navigate('cust', document.querySelectorAll('.nav-item')[1]);
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const list = customers.filter(c => c.name.toLowerCase().includes(q) || c.phone.includes(q));
  document.getElementById('cust-body').innerHTML = list.map(c => `
    <tr>
      <td><b>${c.name}</b></td><td>${c.phone}</td>
      <td><button class="btn btn-wa btn-sm" onclick="send('${c.phone}', '${c.name}')">WhatsApp</button></td>
    </tr>
  `).join('');
}

function send(phone, name) {
  const msg = `*नमस्ते ${name} सर,* 🙏\n\nम *PRERAK Construction* बाट बोलिरहेको छु। हेटौँडा-२ मा रहेको हाम्रो सोरुममा हजुरलाई स्वागत छ। हजुरको निर्माण कार्यको लागि हामीसँग उत्कृष्ट *UPVC र एएसी ब्लक* उपलब्ध छन्।\n\nधन्यवाद!`;
  window.open(`https://wa.me/977${phone}?text=${encodeURIComponent(msg)}`, '_blank');
}

function updateDash() { document.getElementById('stat-total').textContent = customers.length; }
function closeWelcome() { document.getElementById('welcome-overlay').classList.add('hide'); }

updateDash();
</script>
</body>
</html>
