<!DOCTYPE html>
<html lang="ne">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRERAK CRM - Masterpiece Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Syne:wght@700;800&family=Tiro+Devanagari+Sanskrit&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050508;
  --panel: rgba(20, 20, 30, 0.7);
  --border: rgba(255, 255, 255, 0.08);
  --accent: #ff5f1f; /* Neon Saffron */
  --green: #22c55e;
  --text: #ffffff;
  --muted: #94a3b8;
  --grad: linear-gradient(135deg, #ff5f1f 0%, #ff2e00 100%);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; display: flex; }

/* १. लक्जरी एनिमेटेड ब्याकग्राउन्ड */
.bg-glow {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: radial-gradient(circle at 50% -20%, #2a1005 0%, #050508 60%);
  z-index: -1;
}

/* २. स्वागत स्क्रिन (The Grand Welcome) */
#welcome-overlay {
  position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center;
  background: #000; transition: 1s cubic-bezier(0.8, 0, 0.2, 1);
}
#welcome-overlay.hide { transform: scale(1.2); opacity: 0; pointer-events: none; }

.om-container { text-align: center; }
.om-glyph {
  font-family: 'Tiro Devanagari Sanskrit', serif; font-size: clamp(6rem, 15vw, 10rem);
  background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 30px rgba(255, 95, 31, 0.5));
  animation: omFloat 4s infinite ease-in-out;
}
@keyframes omFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

/* ३. साइडबार (Floating Glass Design) */
#sidebar {
  width: 280px; margin: 20px; border-radius: 24px;
  background: var(--panel); border: 1px solid var(--border);
  backdrop-filter: blur(20px); display: flex; flex-direction: column;
  transition: 0.4s;
}
.brand { padding: 40px 30px; }
.brand h1 { font-family: 'Syne', sans-serif; font-size: 1.8rem; letter-spacing: -1px; }
.brand span { color: var(--accent); }

nav { flex: 1; padding: 0 15px; }
.nav-item {
  padding: 16px 20px; border-radius: 16px; cursor: pointer;
  display: flex; align-items: center; gap: 12px; margin-bottom: 8px;
  color: var(--muted); transition: 0.3s; font-weight: 500;
}
.nav-item:hover, .nav-item.active { background: rgba(255, 95, 31, 0.1); color: #fff; }
.nav-item.active { background: var(--grad); box-shadow: 0 10px 20px rgba(255, 95, 31, 0.3); }

/* ४. मुख्य भाग */
#main { flex: 1; padding: 20px 20px 20px 0; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; }
.page { display: none; animation: pageIn 0.5s cubic-bezier(0.2, 1, 0.3, 1) forwards; }
.page.active { display: block; }
@keyframes pageIn { from { opacity:0; transform: scale(0.98) translateY(10px); } to { opacity:1; transform: scale(1) translateY(0); } }

.card {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 24px; padding: 30px; backdrop-filter: blur(10px);
}

/* ५. स्मार्ट तालिका र इनपुट */
table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
th { text-align: left; padding: 15px; color: var(--muted); font-size: 0.8rem; text-transform: uppercase; }
td { background: rgba(255,255,255,0.03); padding: 20px; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
td:first-child { border-left: 1px solid var(--border); border-radius: 16px 0 0 16px; }
td:last-child { border-right: 1px solid var(--border); border-radius: 0 16px 16px 0; }

input {
  width: 100%; padding: 18px; background: rgba(255,255,255,0.05);
  border: 1px solid var(--border); border-radius: 16px; color: #fff; font-size: 1rem;
}
input:focus { border-color: var(--accent); background: rgba(255,255,255,0.08); }

.btn {
  padding: 15px 30px; border-radius: 16px; border: none; cursor: pointer;
  font-weight: 700; font-family: 'Plus Jakarta Sans', sans-serif; transition: 0.3s;
}
.btn-primary { background: var(--grad); color: #fff; }
.btn-wa { background: #25D366; color: #fff; box-shadow: 0 5px 15px rgba(37, 211, 102, 0.2); }

#toast {
  position: fixed; top: 30px; left: 50%; transform: translateX(-50%) translateY(-100px);
  background: #fff; color: #000; padding: 15px 30px; border-radius: 50px;
  font-weight: 600; box-shadow: 0 10px 40px rgba(0,0,0,0.5); transition: 0.5s;
}
#toast.show { transform: translateX(-50%) translateY(0); }

@media (max-width: 768px) {
  #sidebar { position: fixed; bottom: 10px; left: 10px; right: 10px; width: auto; height: 70px; flex-direction: row; margin: 0; z-index: 1000; }
  .brand, #theme-btn, .nav-item span { display: none; }
  nav { flex-direction: row; padding: 10px; justify-content: space-around; width: 100%; }
  #main { padding: 15px; padding-bottom: 100px; }
}
</style>
</head>
<body>

<div class="bg-glow"></div>

<div id="welcome-overlay">
  <div class="om-container">
    <div class="om-glyph">ॐ</div>
    <h1 style="color: #ffd700; margin-top: 20px;">ॐ नमः शिवाय</h1>
    <p style="color: var(--muted); margin-top: 10px; letter-spacing: 2px;">प्ररेक कन्सट्रक्सन - मास्टरपिस</p>
    <button class="btn btn-primary" onclick="closeWelcome()" style="margin-top: 40px; border-radius: 50px;">🙏 प्रवेश गर्नुहोस्</button>
  </div>
</div>

<aside id="sidebar">
  <div class="brand"><h1>PRERAK<span>.</span></h1><p style="font-size: 0.7rem; color: var(--muted);">ADMIN PANEL</p></div>
  <nav>
    <div class="nav-item active" onclick="navigate('dash', this)">🏠 <span>ड्यासबोर्ड</span></div>
    <div class="nav-item" onclick="navigate('cust', this)">👥 <span>ग्राहकहरू</span></div>
    <div class="nav-item" onclick="navigate('add', this)">✨ <span>नयाँ थप्नुहोस्</span></div>
  </nav>
  <button id="theme-btn" onclick="cycleTheme()" class="btn" style="background: transparent; color: var(--muted); margin-bottom: 20px;">🎨 Theme</button>
</aside>

<main id="main">
  <div class="page active" id="page-dash">
    <div class="card">
      <h2 style="font-family: 'Syne'; margin-bottom: 20px;">ड्यासबोर्ड</h2>
      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;">
        <div style="background: rgba(255,95,31,0.05); padding: 30px; border-radius: 20px; border: 1px solid rgba(255,95,31,0.1);">
          <p style="color: var(--muted); font-size: 0.8rem;">कुल ग्राहक</p>
          <h1 id="stat-total" style="font-size: 3rem; color: var(--accent);">0</h1>
        </div>
        <div style="background: rgba(255,255,255,0.02); padding: 30px; border-radius: 20px; border: 1px solid var(--border);">
          <p style="color: var(--muted); font-size: 0.8rem;">आजको समय</p>
          <h2 id="clock" style="margin-top: 10px;">--:--</h2>
        </div>
      </div>
    </div>
  </div>

  <div class="page" id="page-cust">
    <div class="card">
      <input type="text" id="search" oninput="render()" placeholder="खोज्नुहोस्..." style="margin-bottom: 20px;">
      <div style="overflow-x: auto;">
        <table id="cust-table">
          <thead><tr><th>ग्राहकको नाम</th><th>सम्पर्क</th><th>एक्सन</th></tr></thead>
          <tbody id="cust-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="page" id="page-add">
    <div class="card" style="max-width: 500px; margin: auto;">
      <h2 style="font-family: 'Syne'; margin-bottom: 25px;">नयाँ ग्राहक थप्नुहोस्</h2>
      <label style="color: var(--muted); font-size: 0.75rem;">पुरा नाम</label><input type="text" id="c-name" style="margin-bottom: 20px;">
      <label style="color: var(--muted); font-size: 0.75rem;">फोन नम्बर</label><input type="tel" id="c-phone" style="margin-bottom: 30px;">
      <button class="btn btn-primary" onclick="add()" style="width: 100%;">सुरक्षित गर्नुहोस् ➔</button>
    </div>
  </div>
</main>

<div id="toast">✅ सन्देश पठाइयो!</div>

<script>
let customers = JSON.parse(localStorage.getItem('p_master_cust') || '[]');

function save() { localStorage.setItem('p_master_cust', JSON.stringify(customers)); }

function toast(m) {
  const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function navigate(page, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  if(page === 'dash') updateDash();
  if(page === 'cust') render();
}

function add() {
  const n = document.getElementById('c-name').value, p = document.getElementById('c-phone').value;
  if(!n || !p) return toast('नाम र फोन भर्नुहोस्!');
  customers.push({ id: Date.now(), name: n, phone: p });
  save(); toast('✅ ग्राहक सुरक्षित भयो!');
  document.getElementById('c-name').value = ''; document.getElementById('c-phone').value = '';
  navigate('cust', document.querySelectorAll('.nav-item')[1]);
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const list = customers.filter(c => c.name.toLowerCase().includes(q) || c.phone.includes(q));
  document.getElementById('cust-body').innerHTML = list.map(c => `
    <tr>
      <td><b style="font-size: 1.1rem;">${c.name}</b></td>
      <td style="color: var(--muted);">${c.phone}</td>
      <td>
        <button class="btn btn-wa" style="padding: 10px 15px;" onclick="send('${c.phone}', '${c.name}')">WhatsApp</button>
      </td>
    </tr>
  `).join('');
}

function send(phone, name) {
  const biz = "*PRERAK Construction* 🏗️";
  const msg = `*नमस्ते ${name} सर,* 🙏\n\nहामी *${biz}* बाट बोलिरहेको छु। हेटौँडा-२, कान्तिराजपथमा रहेको हाम्रो सोरुममा हजुरलाई स्वागत छ। हजुरको निर्माण कार्यको लागि हामीसँग उत्कृष्ट *UPVC र एएसी ब्लक* उपलब्ध छन्।\n\nधन्यवाद!`;
  window.open(`https://wa.me/977${phone}?text=${encodeURIComponent(msg)}`, '_blank');
}

function updateDash() {
  document.getElementById('stat-total').textContent = customers.length;
}

function closeWelcome() { document.getElementById('welcome-overlay').classList.add('hide'); }

setInterval(() => {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}, 1000);

updateDash();
</script>
</body>
</html>
